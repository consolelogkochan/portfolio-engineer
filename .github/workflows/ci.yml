name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5      # → @v5 に変更

      - uses: actions/setup-node@v5    # → @v5 に変更
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit

      - run: npm run lint

      - run: npm run format:check

      - run: npm run build

      - run: npx tsx scripts/validate-content.ts
